        .sitemap-container {

        .sitemap-grid {
            display: grid;

            border-radius: 8px;
            padding: 1.2rem;

            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border);
        }
        .sitemap-section ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sitemap-section li {
            padding: 0.3rem 0;
            font-size: 0.9rem;
        }
        .sitemap-section a {
            color: var(--text-primary);
            text-decoration: none;
        }
        .sitemap-section a:hover {
            color: var(--primary);
        }
        @media (max-width: 900px) {
            .sitemap-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .sitemap-grid { grid-template-columns: 1fr; }
            .sitemap-container { padding: 1rem; }
        }
    </style>
